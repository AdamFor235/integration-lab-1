<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>
    <h1>Lista postów</h1>
    {% for post in posts %}
        <h2>
            <a href="{% url 'postDetail' post.pk %}">
                {{ post.title }}
            </a>
        </h2>
        <p>{{ post.created_at }}</p>
        <hr>
    {% empty %}
        <p>Brak postów.</p>
    {% endfor %}
</body>
</html>
